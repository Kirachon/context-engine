name: Test Suite

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Run all tests
        run: npm test
      
      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  compatibility:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Run MCP smoke check
        run: npm run ci:check:mcp-smoke

      - name: Run MCP eval smoke (informational)
        run: npm run ci:check:mcp-eval-smoke
        continue-on-error: true

      - name: Run MCP compatibility gate (informational)
        run: npm run ci:check:mcp-compatibility
        continue-on-error: true

      - name: Run legacy capability parity check
        run: npm run ci:check:legacy-capability-parity
      
      - name: Verify setup
        run: npm run verify

  quality-gates:
    runs-on: ubuntu-latest
    needs: [test, compatibility]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Coverage threshold check
        run: npm run test:coverage -- --coverageThreshold='{"global":{"branches":70,"functions":75,"lines":75}}'
      
      - name: All quality gates passed
        run: echo "✅ All quality gates passed"

