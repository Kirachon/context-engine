# WS20 rollout stage evidence template
# Copy this file, fill the fields for the stage you are validating, and keep only relevant sections.
# Validation thresholds source: config/rollout-go-no-go-thresholds.json

schema_version: 1
rollout_id: "CE-ROLLOUT-YYYYMMDD-01"
stage: 2
stage_name: controlled_ramp
environment: production
window:
  start_utc: "2026-02-28T00:00:00Z"
  end_utc: "2026-03-03T00:00:00Z"

pre_rollout:
  baseline_snapshot_id: "bench-nightly-2026-02-27"
  checklist_complete: true

canary:
  percent: 1
  soak_hours: 24
  exit_criteria_met: true
  signed_by: "release.owner"
  evidence_ref: "docs/ROLLOUT_EVIDENCE_LOG.md#recorded-evidence---2026-03-04-ws20-staged-cutover-1-10-50-100"

controlled_ramp:
  # Keep required checkpoints aligned with config/rollout-go-no-go-thresholds.json.
  # Operator-facing milestones can still be summarized as 1% -> 10% -> 50% -> 100%.
  checkpoints:
    - percent: 10
      soak_hours: 24
      status: pass
      signed_by: "release.owner"
      evidence_ref: "docs/ROLLOUT_EVIDENCE_LOG.md#recorded-evidence---2026-03-04-ws20-staged-cutover-1-10-50-100"
    - percent: 25
      soak_hours: 48
      status: pass
      signed_by: "release.owner"
      evidence_ref: "docs/ROLLOUT_EVIDENCE_LOG.md#recorded-evidence---2026-03-04-ws20-staged-cutover-1-10-50-100"
    - percent: 50
      soak_hours: 72
      status: pass
      signed_by: "release.owner"
      evidence_ref: "docs/ROLLOUT_EVIDENCE_LOG.md#recorded-evidence---2026-03-04-ws20-staged-cutover-1-10-50-100"

ga_hardening:
  soak_hours: 24
  stability_confirmed: true
  full_cutover_percent: 100
  closeout_evidence_ref: "docs/ROLLOUT_EVIDENCE_LOG.md#recorded-evidence---2026-03-04-ws20-staged-cutover-1-10-50-100"
  signed_by: "release.owner"
